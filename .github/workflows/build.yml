name: Build and Release

on:
  push:
    # No paths filter here: a v* tag usually points at an already-pushed commit,
    # so a tag push carries no "changed files" and a paths filter would skip the
    # whole run — including the release job. Branch-push noise is filtered on the
    # pull_request side instead.
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'source/**'
      - 'examples/**'
      - 'cmake/**'
      - 'CMakeLists.txt'

concurrency:
  # Cancel superseded runs on the same ref. Distinct refs get distinct groups,
  # so a tag's release run is never cancelled by a later push to main.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Vulkan SDK version
        id: vksdk
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://vulkan.lunarg.com/sdk/latest/windows.json -OutFile windows.json
          $version = (Get-Content windows.json | ConvertFrom-Json).windows
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "VULKAN_SDK=C:\VulkanSDK\$version" >> $env:GITHUB_ENV

      - name: Cache Vulkan SDK
        id: cache-vulkan-sdk
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ steps.vksdk.outputs.version }}
          key: vulkan-sdk-windows-${{ steps.vksdk.outputs.version }}

      - name: Install Vulkan SDK
        if: steps.cache-vulkan-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Start-BitsTransfer -Source https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe -Destination vulkan_sdk.exe
          .\vulkan_sdk.exe --accept-licenses --default-answer --confirm-command install

      - name: Configure
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-latest
          path: build/Release/VulkanWindow.exe

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        # glslc (shaderc) compiles the examples' shaders; without it
        # vulkanwindow_add_shaders() guards make examples/ return() early and
        # the example targets are never built here — so example regressions
        # would slip past CI. With it, `cmake --build` compiles them too.
        # GLFW builds both backends on the runner. X11 deps come via xorg-dev
        # (GLFW's recommended metapackage: Xrandr, Xinerama, Xcursor, Xi, Xext,
        # …). Wayland needs wayland-scanner (libwayland-bin), libwayland-dev, and
        # wayland-protocols. libxkbcommon-dev is used by both backends and isn't
        # part of xorg-dev, so it stays explicit.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib vulkan-tools libvulkan-dev glslc \
            xorg-dev libxkbcommon-dev \
            libwayland-dev libwayland-bin wayland-protocols clang-tidy

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}

      - name: Configure
        # Emit compile_commands.json for clang-tidy; route the compilers through
        # ccache so unchanged deps (GLFW/ImGui/VMA) aren't recompiled each run.
        # Tests are built here (this is the only job that runs them) — doctest is
        # fetched via FetchContent.
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVULKANWINDOW_BUILD_TESTS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config Release

      - name: Run unit tests
        # Pure-logic tests (selectors, colour/format helpers) — no GPU, ICD, or
        # display needed, so they run on the plain runner.
        run: ctest --test-dir build --output-on-failure

      - name: Verify examples built
        # glslc is installed, so the example targets MUST exist. If they don't,
        # vulkanwindow_add_shaders()'s guard silently return()'d — fail rather
        # than let a no-examples build pass green.
        run: |
          for b in build/examples/triangle/VulkanWindowTriangle \
                   build/examples/textured_quad/VulkanWindowTexturedQuad; do
            test -x "$b" || { echo "::error::expected example binary missing: $b"; exit 1; }
          done

      - name: Run clang-tidy
        # Lint our sources only — skip deps/ headers. -quiet keeps the log
        # readable; warnings still fail the job via -warnings-as-errors=*.
        # `|| true` is NOT used: a clang-tidy diagnostic should fail CI. Strip
        # the ccache launcher prefix from the compile DB first, or clang-tidy
        # mistakes "ccache" for the compiler.
        run: |
          sed -i 's/"command": "ccache /"command": "/' build/compile_commands.json
          run-clang-tidy -p build -quiet -warnings-as-errors='*' \
            "$(pwd)/source/.*\.(cpp|h)$"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest
          path: build/VulkanWindow

  smoke:
    name: Smoke test (lavapipe + validation)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        # mesa-vulkan-drivers ships the lavapipe software ICD;
        # vulkan-validationlayers ships VK_LAYER_KHRONOS_validation; xvfb gives
        # the GLFW window a virtual X server. xorg-dev / libxkbcommon-dev /
        # libwayland* / wayland-protocols are GLFW's X11 + Wayland build deps
        # (same set as the linux job). The smoke run itself uses X11 via xvfb.
        # glslc builds the examples' shaders so they're smoke-tested too.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev vulkan-validationlayers mesa-vulkan-drivers xvfb glslc \
            xorg-dev libxkbcommon-dev \
            libwayland-dev libwayland-bin wayland-protocols

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}

      - name: Configure
        # Debug build compiles in VK_LAYER_KHRONOS_validation + synchronization
        # validation (see VulkanContext / VulkanRenderer). ccache skips
        # recompiling unchanged deps across runs.
        run: |
          cmake -B build-debug -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build-debug --config Debug

      - name: Run headless under lavapipe with validation
        # Renders a fixed number of frames then exits; aborts with a non-zero
        # status on any validation error or synchronization-validation hazard,
        # so a regression that compiles and lints clean still fails CI. Runs the
        # demo AND both examples — the examples exercise the consumer-facing
        # buffer / texture / descriptor / pipeline paths the demo doesn't.
        run: |
          set -euo pipefail

          # Force Mesa's software rasterizer — the runners have no GPU.
          LVP="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -n1 || true)"
          if [ -z "$LVP" ]; then
            echo "::error::lavapipe ICD not found"
            ls -la /usr/share/vulkan/icd.d/ || true
            exit 1
          fi
          export VK_ICD_FILENAMES="$LVP" VK_DRIVER_FILES="$LVP"
          echo "lavapipe ICD: $LVP"

          # Guard against a false pass where the validation layer is missing and
          # the app silently runs without it.
          ls /usr/share/vulkan/explicit_layer.d/ | grep -qi validation \
            || { echo "::error::validation layer manifest not installed"; exit 1; }

          export VULKANWINDOW_MAX_FRAMES=120
          export VULKANWINDOW_VALIDATION_ABORT=1

          bins=(
            ./build-debug/VulkanWindow
            ./build-debug/examples/triangle/VulkanWindowTriangle
            ./build-debug/examples/textured_quad/VulkanWindowTexturedQuad
          )
          for bin in "${bins[@]}"; do
            if [ ! -x "$bin" ]; then
              echo "::error::expected smoke binary missing: $bin (glslc not found at configure?)"
              exit 1
            fi
            echo "=== smoke: $bin ==="
            # timeout guards against a hang; the binary self-exits at 120 frames.
            timeout 180 xvfb-run -a "$bin" 2>&1 | tee run.log
            if grep -q "running without validation" run.log; then
              echo "::error::validation layer was not active for $bin — smoke test is meaningless"
              exit 1
            fi
          done
          echo "Smoke test passed: demo + 2 examples, 120 frames each under lavapipe, validation active, no errors."

  macos:
    name: Build (macOS / MoltenVK)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan deps (Homebrew)
        # macOS has no native Vulkan. vulkan-loader is the ICD loader,
        # molten-vk the Vulkan-over-Metal ICD (the only "device" here),
        # vulkan-headers the headers find_package(Vulkan) resolves, and shaderc
        # supplies glslc for the examples' shaders. Homebrew is preferred over
        # the LunarG SDK installer because it's non-interactive and lands
        # everything under `brew --prefix`. This is the job that actually
        # compiles the portability (VK_KHR_portability_*) code paths against a
        # real MoltenVK ICD — nothing else in CI does.
        run: |
          brew update
          brew install vulkan-headers vulkan-loader molten-vk shaderc

      - name: Configure
        # Point find_package(Vulkan) at the Homebrew prefix for the loader +
        # headers. If FindVulkan ever fails to locate them, pin explicitly with
        # -DVulkan_INCLUDE_DIR / -DVulkan_LIBRARY instead.
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build build --config Release

      - name: Verify examples built
        # glslc (from shaderc) is installed, so the example targets MUST exist —
        # same guard as the linux job; a silent return() from the shader helper
        # should fail rather than pass green.
        run: |
          for b in build/examples/triangle/VulkanWindowTriangle \
                   build/examples/textured_quad/VulkanWindowTexturedQuad; do
            test -x "$b" || { echo "::error::expected example binary missing: $b"; exit 1; }
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-latest
          path: build/VulkanWindow

  macos-smoke:
    name: Smoke test (MoltenVK + validation)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan deps (Homebrew)
        # Adds vulkan-validationlayers on top of the build deps so the Debug
        # run can make validation errors fatal (as the lavapipe job does), and
        # coreutils for gtimeout (macOS ships no `timeout`).
        run: |
          brew update
          brew install vulkan-headers vulkan-loader molten-vk shaderc \
            vulkan-validationlayers coreutils

      - name: Configure
        # Debug build compiles in VK_LAYER_KHRONOS_validation + synchronization
        # validation (see VulkanContext / VulkanRenderer).
        run: |
          cmake -B build-debug -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build build-debug --config Debug

      - name: Run headless under MoltenVK with validation
        # Renders a fixed number of frames then exits; aborts non-zero on any
        # validation error or synchronization-validation hazard. MoltenVK is the
        # only ICD; the validation layer comes from the Homebrew manifest dir.
        # No xvfb (that's X11) — the macOS runner's window server backs the
        # GLFW/Metal surface directly. Runs the demo AND both examples.
        run: |
          set -euo pipefail

          PREFIX="$(brew --prefix)"

          # Locate the MoltenVK ICD manifest. Homebrew's molten-vk layout has
          # moved between formula versions, so search the prefix instead of
          # hardcoding a path. If the formula ships no manifest, synthesize one
          # pointing at libMoltenVK.dylib — the loader only needs the JSON to
          # find the dylib.
          MVK_ICD="$(find "$PREFIX" -name 'MoltenVK_icd.json' 2>/dev/null | head -n1 || true)"
          if [ -z "$MVK_ICD" ]; then
            MVK_LIB="$(find "$PREFIX" -name 'libMoltenVK.dylib' 2>/dev/null | head -n1 || true)"
            test -n "$MVK_LIB" || { echo "::error::no MoltenVK ICD manifest or libMoltenVK.dylib under $PREFIX"; exit 1; }
            MVK_ICD="$PWD/MoltenVK_icd.json"
            cat > "$MVK_ICD" <<EOF
          {
            "file_format_version": "1.0.0",
            "ICD": { "library_path": "$MVK_LIB", "api_version": "1.2.0" }
          }
          EOF
            echo "Synthesized MoltenVK ICD manifest -> $MVK_LIB"
          fi
          export VK_ICD_FILENAMES="$MVK_ICD" VK_DRIVER_FILES="$MVK_ICD"
          echo "MoltenVK ICD: $MVK_ICD"

          # Locate the validation layer manifest the same way (guards against a
          # false pass where the layer is missing and the app silently runs
          # without it). Its dir is what the loader scans via VK_LAYER_PATH.
          VK_LAYER_JSON="$(find "$PREFIX" -name 'VkLayer_khronos_validation.json' 2>/dev/null | head -n1 || true)"
          test -n "$VK_LAYER_JSON" || { echo "::error::validation layer manifest not found under $PREFIX"; exit 1; }
          export VK_LAYER_PATH="$(dirname "$VK_LAYER_JSON")"
          echo "Validation layer manifest dir: $VK_LAYER_PATH"

          # The Homebrew manifest's library_path is a bare dylib name, so the
          # loader hands it straight to dlopen — which fails unless the dylib's
          # directory is on the dynamic-linker search path. Add it to
          # DYLD_LIBRARY_PATH. (DYLD_* survives here because every process in
          # the chain after this export — gtimeout, the test binary — is
          # unrestricted; only SIP-protected binaries strip it.)
          VK_LAYER_LIB="$(find "$PREFIX" -name 'libVkLayer_khronos_validation.dylib' 2>/dev/null | head -n1 || true)"
          test -n "$VK_LAYER_LIB" || { echo "::error::validation layer dylib not found under $PREFIX"; exit 1; }
          export DYLD_LIBRARY_PATH="$(dirname "$VK_LAYER_LIB")${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
          echo "Validation layer dylib dir: $(dirname "$VK_LAYER_LIB")"

          export VULKANWINDOW_MAX_FRAMES=120
          export VULKANWINDOW_VALIDATION_ABORT=1

          bins=(
            ./build-debug/VulkanWindow
            ./build-debug/examples/triangle/VulkanWindowTriangle
            ./build-debug/examples/textured_quad/VulkanWindowTexturedQuad
          )
          for bin in "${bins[@]}"; do
            if [ ! -x "$bin" ]; then
              echo "::error::expected smoke binary missing: $bin (glslc not found at configure?)"
              exit 1
            fi
            echo "=== smoke: $bin ==="
            # gtimeout (coreutils) guards against a hang; the binary self-exits
            # at 120 frames. set -o pipefail propagates a validation-abort
            # non-zero exit through the `| tee` pipeline so it fails the job.
            gtimeout 180 "$bin" 2>&1 | tee run.log
            if grep -q "running without validation" run.log; then
              echo "::error::validation layer was not active for $bin — smoke test is meaningless"
              exit 1
            fi
          done
          echo "macOS smoke passed: demo + 2 examples, 120 frames each under MoltenVK, validation active, no errors."

  release:
    name: Release
    # Only publish a Release when a v* tag is pushed — not on every commit to
    # main. Pull-request builds also skip this job.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [windows, linux, smoke, macos, macos-smoke]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            **Built by GitHub Actions**
            [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            ubuntu-latest/VulkanWindow
            windows-latest/VulkanWindow.exe
